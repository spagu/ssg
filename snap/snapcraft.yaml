name: ssg
version: "1.7.9"
title: SSG - Static Site Generator
summary: Fast static site generator written in Go
description: |
  SSG converts Markdown content with YAML frontmatter to static HTML sites.

  Features:
  - Built-in HTTP server with watch mode
  - WebP image conversion
  - Cloudflare Pages deployment support
  - Multiple template engines (Go, Pongo2, Mustache, Handlebars)
  - SEO-friendly URL generation
  - Config variables with env var support

grade: stable
confinement: strict
license: BSD-3-Clause
base: core24

contact: https://github.com/spagu/ssg/issues
issues: https://github.com/spagu/ssg/issues
source-code: https://github.com/spagu/ssg
website: https://github.com/spagu/ssg
donation: https://github.com/sponsors/spagu

platforms:
  amd64:
  arm64:

apps:
  ssg:
    command: bin/ssg
    plugs:
      - home
      - removable-media
      - network
      - network-bind

parts:
  ssg:
    plugin: go
    source: .
    source-type: local
    build-snaps:
      - go/latest/stable
    override-build: |
      go build -ldflags "-s -w" -o $SNAPCRAFT_PART_INSTALL/bin/ssg ./cmd/ssg
