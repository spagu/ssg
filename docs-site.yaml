# Documentation site for SSG itself.
#
# Deliberately NOT named .ssg.yaml: that filename is auto-detected by every ssg
# invocation in this directory, so a config describing THIS site would hijack
# any other build run from a checkout — including the action's own test jobs,
# which is exactly what happened once the published image understood
# content_sources. Always pass it explicitly: ssg --config docs-site.yaml
#
# It has no content/<source>/ tree: the pages ARE this repository's docs/ and
# examples/ Markdown, pulled in through content_sources (CONTENT-002). Editing a
# guide and rebuilding is the whole workflow — nothing is copied or generated
# into a second location that could drift.
#
#   make site        # build into .site/
#   make site-serve  # build and serve on http://127.0.0.1:8888
template: ssgtheme
domain: ssg.tradik.com
output_dir: .site

content_sources:
  - path: docs
    type: page
    category: Documentation
  # Posts. Deliberately uncategorised: a category would generate a second
  # listing at /category/blog/ with exactly the same posts as /blog/, and two
  # self-canonical URLs holding the same content is duplicate content with
  # extra steps. The index is pages/blog.md (layout: blog).
  - path: blog
    type: post
  # Standalone pages that are not documentation — the blog index and the
  # cookie policy the consent banner links to.
  - path: pages
    type: page

# The docs site dogfoods the cookie-consent worker: its functions ship with the
# build, and ssgtheme renders the banner from variables.cookie_consent below.
workers:
  - name: cookie-consent
    dir: workers/cookie-consent
    routes_include: [/api/consent/*]
  - name: comments
    dir: workers/comments
    routes_include: [/api/comments, /api/comments/*]

# Docs cross-link each other as CONFIGURATION.md, which only resolves in a
# repository view; rewrite_md_links turns those into the built page URLs
# (anchors included), and strip_md_link_text drops the ".md" from the visible
# link text ("see CONFIGURATION" instead of "see CONFIGURATION.md").
rewrite_md_links: true
strip_md_link_text: true

# The guides also link to repository files the site never publishes
# (../examples/, the sample config). Point those at GitHub instead of 404ing.
link_rewrites:
  "../examples/": "https://github.com/spagu/ssg/tree/main/examples/"
  "../templates/": "https://github.com/spagu/ssg/tree/main/templates/"
  "../workers/": "https://github.com/spagu/ssg/tree/main/workers/"
  "../.github/": "https://github.com/spagu/ssg/blob/main/.github/"
  "../.ssg.yaml.example": "https://github.com/spagu/ssg/blob/main/.ssg.yaml.example"
check_links: warn
shortcode_errors: strict

# docs/*.md have no "## Excerpt" section; derive one from the opening paragraph
# so cards, feeds and meta descriptions are not blank.
auto_excerpt: true

# Posts live under /blog/, without the publication date: these are guides that
# stay relevant, and a date in the path only makes them look stale. The
# permalink pattern outranks post_url_format, which stays as the fallback.
permalinks:
  post: "/blog/:slug/"

post_url_format: slug

pretty_html: true
sitemap_off: false
robots_off: false
search_index: true

# Code blocks: Chroma syntax highlighting with line numbers, and Mermaid
# diagrams rendered from ```mermaid fences (runtime injected only on pages that
# use one).
highlight: true
highlight_style: github-dark
highlight_line_numbers: true
mermaid: true

variables:
  project_name: SSG
  repository_url: https://github.com/spagu/ssg
  logo: logo.png # assets/logo.png, transparent, resized at build time
  hero_image: river.jpg # assets/river.jpg, resized at build time
  github_repo: spagu/ssg # enables the header star count
  version: "1.8.13"

  # Cookie-consent banner config (rendered by ssgtheme when this is present).
  # geoMode "always" shows it everywhere so the demo is visible without the
  # edge geo Function; a real site would use "edge" to gate it to the EEA+UK.
  cookie_consent:
    version: "1"
    policyUrl: /cookie-policy/
    geoMode: always
    expiryDays: 180
    categories:
      - id: necessary
        required: true
      - id: analytics
      - id: marketing

  # Comments widget on blog posts. The site key here is Cloudflare's public
  # test key (always passes) so the demo form works without real Turnstile
  # setup; swap it for your own. The widget needs the comments worker's D1 to
  # actually store/list — locally that means the wrangler dev path.
  comments:
    turnstileSiteKey: "1x00000000000000000000AA"
    api: /api/comments
    order: newest

  # Header navigation: a fixed, hand-picked set. The footer carries the full
  # guide directory, so this stays short whatever docs/ grows into.
  nav:
    - label: Docs
      url: /#documentation
    - label: Configuration
      url: /configuration/
    - label: Blog
      url: /blog/
    - label: Themes
      url: /templates/
    - label: Deployment
      url: /deployment/
    - label: GitHub
      url: https://github.com/spagu/ssg
