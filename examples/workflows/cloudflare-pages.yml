# Example: Build AND publish to Cloudflare Pages with SSG's native deploy.
# SSG uploads the site itself via the Cloudflare Pages Direct Upload API — no wrangler.
# Copy this workflow to your repository and customize the inputs.
#
# NOTE: use `uses: spagu/ssg@main` for the latest, or `@v1` after release.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   - token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account ID

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build and deploy to Cloudflare Pages
        uses: spagu/ssg@main
        with:
          source: "my-content" # Your content folder
          template: "krowy" # Template: 'simple' or 'krowy'
          domain: "example.com" # Your domain
          webp: "true" # Convert images to WebP
          deploy: "cloudflare" # Native Direct Upload — no wrangler needed
          deploy-project: "my-site" # Your Cloudflare Pages project name
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
