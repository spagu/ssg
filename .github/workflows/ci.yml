# CI/CD Pipeline for SSG
# Runs tests, builds binaries and packages, creates releases

name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
    paths-ignore:
      # Content and the docs theme cannot change the binary or its tests:
      # embedded.go embeds templates/simple and templates/krowy only, so
      # templates/ssgtheme is site material like docs/ and blog/. The docs site
      # has its own workflow, which builds and link-checks all of this.
      # Tag pushes ignore path filters entirely, so releases are unaffected.
      - "docs/**"
      - "blog/**"
      - "assets/**"
      - "templates/ssgtheme/**"
      - ".ssg.yaml"
      - "*.md"
      - ".github/workflows/docs-site.yml"
  pull_request:
    branches: [main, master]
    paths-ignore:
      # Content and the docs theme cannot change the binary or its tests:
      # embedded.go embeds templates/simple and templates/krowy only, so
      # templates/ssgtheme is site material like docs/ and blog/. The docs site
      # has its own workflow, which builds and link-checks all of this.
      # Tag pushes ignore path filters entirely, so releases are unaffected.
      - "docs/**"
      - "blog/**"
      - "assets/**"
      - "templates/ssgtheme/**"
      - ".ssg.yaml"
      - "*.md"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:
    inputs:
      build_packages:
        description: "Build DEB/RPM packages"
        required: false
        default: false
        type: boolean

env:
  # Pinned to 1.26.5+: 1.26.4 stdlib crypto/tls is affected by GO-2026-5856
  # (Encrypted Client Hello privacy leak), fixed in go1.26.5.
  GO_VERSION: "1.26.5"
  # Node.js 20 is deprecated on runners; run JS actions on Node 24 explicitly.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel superseded runs on the same ref to save runner minutes (OPS-011).
# Tag pushes get a unique group so release runs are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Default least-privilege token for all jobs; the release job elevates to
# contents: write where it actually needs to publish artifacts.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2 # pinned for reproducible CI (OPS-013)

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0 # pinned (OPS-013)

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, lint, security]
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux # 32-bit ARMv7 (Raspberry Pi 2/3, older SBCs)
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          # FreeBSD
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64
          - goos: freebsd
            goarch: arm64
            suffix: freebsd-arm64
          # OpenBSD
          - goos: openbsd
            goarch: amd64
            suffix: openbsd-amd64
          - goos: openbsd
            goarch: arm64
            suffix: openbsd-arm64
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          # Windows
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64
            ext: .exe
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BINARY_NAME="ssg${{ matrix.ext }}"
          go build -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o "dist/${BINARY_NAME}" ./cmd/ssg

      - name: Create archive and raw binary (Unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          # Create archive without version in filename (simpler URLs)
          tar -czvf "ssg-${{ matrix.suffix }}.tar.gz" ssg
          # Also keep raw binary with platform suffix for direct download
          mv ssg "ssg-${{ matrix.suffix }}"

      - name: Create archive and raw binary (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          # Create archive without version in filename
          zip "ssg-${{ matrix.suffix }}.zip" ssg.exe
          # Also keep raw binary with platform suffix
          mv ssg.exe "ssg-${{ matrix.suffix }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ssg-${{ matrix.suffix }}
          path: dist/*
          retention-days: 7

  build-deb:
    name: Build DEB Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, lint, security]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_packages == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o ssg ./cmd/ssg

      - name: Build DEB package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_DIR="ssg_${VERSION}_${ARCH}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/doc/ssg"
          mkdir -p "${PKG_DIR}/usr/share/man/man1"

          cp ssg "${PKG_DIR}/usr/bin/"
          chmod 755 "${PKG_DIR}/usr/bin/ssg"

          cp README.md CHANGELOG.md "${PKG_DIR}/usr/share/doc/ssg/"
          cp man/ssg.1 "${PKG_DIR}/usr/share/man/man1/ssg.1"
          gzip -9 "${PKG_DIR}/usr/share/man/man1/ssg.1"
          echo "MIT License" > "${PKG_DIR}/usr/share/doc/ssg/LICENSE"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: ssg
          Version: ${VERSION}
          Section: web
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: spagu <spagu@github.com>
          Homepage: https://github.com/spagu/ssg
          Description: Fast static site generator written in Go
           SSG converts Markdown content with YAML frontmatter to static HTML.
           Features: WebP conversion, built-in HTTP server, watch mode.
          Depends: libc6
          Recommends: webp
          EOF

          dpkg-deb --build "${PKG_DIR}"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ssg-deb-${{ matrix.arch }}
          path: "*.deb"
          retention-days: 7

  build-rpm:
    name: Build RPM Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, lint, security]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_packages == 'true'
    strategy:
      matrix:
        include:
          - goarch: amd64
            rpmarch: x86_64
          - goarch: arm64
            rpmarch: aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o ssg ./cmd/ssg

      - name: Build RPM package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.rpmarch }}"

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp ssg ~/rpmbuild/BUILD/

          cat > ~/rpmbuild/SPECS/ssg.spec << EOF
          Name:           ssg
          Version:        ${VERSION}
          Release:        1
          Summary:        Fast static site generator
          License:        MIT
          URL:            https://github.com/spagu/ssg

          %description
          SSG is a fast static site generator written in Go.

          %install
          mkdir -p %{buildroot}%{_bindir}
          install -m 755 %{_builddir}/ssg %{buildroot}%{_bindir}/ssg

          %files
          %{_bindir}/ssg
          EOF

          rpmbuild -bb --target ${ARCH} ~/rpmbuild/SPECS/ssg.spec
          cp ~/rpmbuild/RPMS/${ARCH}/*.rpm .

      - name: Upload RPM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ssg-rpm-${{ matrix.rpmarch }}
          path: "*.rpm"
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, build-deb, build-rpm]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_packages == 'true'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release

          # Copy all archives and packages
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" \) \
            -exec cp {} release/ \;

          # Copy raw binaries (files starting with ssg- without extension, not ending with common extensions)
          find artifacts -type f -name "ssg-*" ! -name "*.tar.gz" ! -name "*.zip" ! -name "*.deb" ! -name "*.rpm" ! -name "*.exe" \
            -exec cp {} release/ \;

          # Copy Windows executables
          find artifacts -type f -name "*.exe" -exec cp {} release/ \;

          # Create checksums
          cd release
          sha256sum * > checksums.sha256

          echo "Release files:"
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Quick Install (Linux/macOS)
            ```bash
            curl -sSL https://raw.githubusercontent.com/spagu/ssg/main/install.sh | bash
            ```

            ### Package Managers
            - **Homebrew**: `brew install spagu/tap/ssg`
            - **Snap**: `snap install ssg`
            - **Debian/Ubuntu**: Download `.deb` file below
            - **Fedora/RHEL**: Download `.rpm` file below

            ### Checksums
            See `checksums.sha256` for file verification.

            📖 Full documentation: https://github.com/spagu/ssg#readme
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishing to Homebrew is a separate concern from publishing the release,
  # with its own failure modes — so it is a separate job in a separate,
  # hand-runnable workflow (OPS-012). A broken tap turns THAT workflow red
  # while the already-published release above stays green.
  homebrew:
    name: Update Homebrew Tap
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/homebrew.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
