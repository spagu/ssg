# Build and publish Snap package
name: Snap

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least-privilege token: this workflow only reads the repo; publishing to the
# Snap Store uses SNAPCRAFT_STORE_CREDENTIALS, not GITHUB_TOKEN.
permissions:
    contents: read

jobs:
    snap:
        name: Build Snap (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 30
        strategy:
            matrix:
                include:
                    - arch: amd64
                      runner: ubuntu-latest
                    - arch: arm64
                      runner: ubuntu-24.04-arm
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Build Snap
              uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1
              id: build

            - name: Upload Snap artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: snap-package-${{ matrix.arch }}
                  path: ${{ steps.build.outputs.snap }}
                  retention-days: 7

            # Publish to Snap Store (requires SNAPCRAFT_STORE_CREDENTIALS secret).
            # workflow_dispatch also publishes, so a stuck store version can be
            # pushed without cutting a new release — the recovery path this
            # workflow lacked when it froze at 1.8.6 (OPS-013). A manual run
            # builds from the default branch, whose VERSION is the truth.
            - name: Publish to Snap Store
              uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1
              if: >-
                (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
                && github.repository == 'spagu/ssg'
              env:
                SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
              with:
                snap: ${{ steps.build.outputs.snap }}
                release: stable
