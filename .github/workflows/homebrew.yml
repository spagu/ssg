# Publishes the Homebrew formula to spagu/homebrew-tap.
#
# Two entry points, one implementation (OPS-012):
#   - workflow_call  — invoked by ci.yml right after a tag's release is created
#   - workflow_dispatch — run by hand for any version that already has a
#     GitHub Release, so a failed tap publish never requires cutting a new tag
#     (re-running the full release rebuilds the binaries and changes their
#     SHA-256 sums, which must not happen to a published version).
#
# Checksums are read from the release's published checksums.sha256, so the
# formula always describes exactly what users download.

name: Homebrew Tap

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v (e.g. 1.8.7)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# No write access to this repo is needed; the tap is pushed with a PAT.
permissions:
  contents: read

jobs:
  publish:
    name: Publish formula
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish formula to spagu/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ inputs.version }}
          TAP_REPO: spagu/homebrew-tap
        run: |
          set -euo pipefail

          # Every failure path below is fatal on purpose. This step used to
          # warn and exit 0, so releases v1.7.15 through v1.8.8 all reported
          # success while the tap sat on v1.7.14 for a week.
          fail() {
            echo "::error::$1"
            {
              echo "## ❌ Homebrew tap NOT updated"
              echo ""
              echo "$1"
              echo ""
              echo "\`brew install spagu/tap/ssg\` still serves the previous version."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          VERSION="${VERSION#v}"
          case "${VERSION}" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) fail "Version '${VERSION}' is not a semantic version like 1.8.7." ;;
          esac

          if [ -z "${GH_TOKEN}" ]; then
            fail "HOMEBREW_TAP_TOKEN is not set — cannot push to ${TAP_REPO}."
          fi

          BASE_URL="https://github.com/spagu/ssg/releases/download/v${VERSION}"
          curl --proto '=https' -fsSL --retry 6 --retry-delay 5 --retry-all-errors \
            "${BASE_URL}/checksums.sha256" -o /tmp/checksums.sha256 \
            || fail "No checksums.sha256 in the v${VERSION} release — does that release exist?"

          sha_for() {
            awk -v want="$1" '$2 == want { print $1 }' /tmp/checksums.sha256
          }

          SHA_DARWIN_ARM64="$(sha_for ssg-darwin-arm64.tar.gz)"
          SHA_DARWIN_AMD64="$(sha_for ssg-darwin-amd64.tar.gz)"
          SHA_LINUX_ARM64="$(sha_for ssg-linux-arm64.tar.gz)"
          SHA_LINUX_AMD64="$(sha_for ssg-linux-amd64.tar.gz)"

          for pair in \
            "darwin-arm64:${SHA_DARWIN_ARM64}" \
            "darwin-amd64:${SHA_DARWIN_AMD64}" \
            "linux-arm64:${SHA_LINUX_ARM64}" \
            "linux-amd64:${SHA_LINUX_AMD64}"; do
            if [ -z "${pair#*:}" ]; then
              fail "No checksum for ssg-${pair%%:*}.tar.gz in the v${VERSION} release."
            fi
          done

          # Keep this template in sync with packaging/brew/ssg.rb.
          cat > /tmp/ssg.rb << FORMULA
          # Homebrew formula for SSG - Static Site Generator
          # Install: brew install spagu/tap/ssg
          # Or: brew tap spagu/tap && brew install ssg
          #
          # Generated by .github/workflows/homebrew.yml — do not edit by hand.

          class Ssg < Formula
            desc "Fast static site generator written in Go"
            homepage "https://github.com/spagu/ssg"
            version "${VERSION}"
            license "BSD-3-Clause"

            on_macos do
              on_arm do
                url "${BASE_URL}/ssg-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/ssg-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE_URL}/ssg-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/ssg-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "ssg"
            end

            test do
              system "#{bin}/ssg", "--help"
            end
          end
          FORMULA

          # Basic auth, the form actions/checkout uses. GitHub's git-over-HTTPS
          # endpoint rejects "AUTHORIZATION: bearer <PAT>" with 401 — and an
          # invalid header also breaks otherwise-anonymous clones of this
          # public repo, which is what made a working token look expired.
          # Passed per-command so it is never written to .git/config.
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"

          git -c http.extraheader="${AUTH_HEADER}" \
            clone --depth 1 "https://github.com/${TAP_REPO}.git" /tmp/homebrew-tap \
            || fail "Could not clone ${TAP_REPO} — check that HOMEBREW_TAP_TOKEN is valid."

          cp /tmp/ssg.rb /tmp/homebrew-tap/ssg.rb
          cd /tmp/homebrew-tap

          # Idempotent by design: re-running for an already-published version is
          # a legitimate no-op, unlike the error paths above.
          if git diff --quiet -- ssg.rb; then
            echo "Formula already at v${VERSION}; nothing to publish."
            echo "## ✅ Homebrew tap already at v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ssg.rb
          git commit -m "ssg: update to v${VERSION}"
          git -c http.extraheader="${AUTH_HEADER}" push \
            || fail "Could not push to ${TAP_REPO} — check HOMEBREW_TAP_TOKEN write permissions."

          {
            echo "## ✅ Homebrew tap updated to v${VERSION}"
            echo ""
            echo "Commit: [\`$(git rev-parse --short HEAD)\`](https://github.com/${TAP_REPO}/commit/$(git rev-parse HEAD))"
            echo ""
            echo '```sh'
            echo "brew update && brew upgrade spagu/tap/ssg"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
