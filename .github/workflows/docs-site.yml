# Publishes SSG's own documentation site (docs/ rendered with the bundled
# ssgtheme, configured by ./docs-site.yaml) to Cloudflare Pages.
#
# The site is built with the ssg binary from THIS commit rather than the
# released action, for two reasons: it exercises the current code on real
# content before a release, and the site's configuration uses keys that only
# exist on main (content_sources, link_rewrites, auto_excerpt).
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   - "Cloudflare Pages: Edit" permission. Attaching the
#                            custom domain additionally needs Zone:DNS:Edit on
#                            the domain's zone; without it that one step warns
#                            and the deployment still publishes.
#   CLOUDFLARE_ACCOUNT_ID  - the Cloudflare account that owns the project
#
# Optional repository variables:
#   CLOUDFLARE_PAGES_PROJECT - Pages project name (default: ssg-docs)
#   DOCS_DOMAIN              - custom domain (default: ssg.tradik.com)
#
# Both the project and the custom domain are created on the first run and left
# alone afterwards, so there is nothing to click in the dashboard.

name: Docs Site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "blog/**"
      - "templates/ssgtheme/**"
      - "assets/**"
      - "docs-site.yaml"
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/docs-site.yml"
  # A pull request builds the site but does not deploy it: a dead link or an
  # unrenderable shortcode in a new post is caught in review, not by a failed
  # production run after the merge.
  pull_request:
    paths:
      - "docs/**"
      - "blog/**"
      - "templates/ssgtheme/**"
      - "assets/**"
      - "docs-site.yaml"
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:
    inputs:
      project:
        description: "Cloudflare Pages project name"
        required: false
        type: string

# One deployment at a time: Pages serialises them anyway, and a queued run
# would only publish an older tree.
concurrency:
  group: docs-site-${{ github.event.pull_request.number || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    # Pull requests reach the build steps and stop before anything is created
    # or uploaded; the deploy steps below are gated on the event.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROJECT: ${{ inputs.project || vars.CLOUDFLARE_PAGES_PROJECT || 'ssg-docs' }}
      DOCS_DOMAIN: ${{ vars.DOCS_DOMAIN || 'ssg.tradik.com' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_API: https://api.cloudflare.com/client/v4
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      # The hero image is encoded as WebP, which SSG delegates to cwebp.
      - name: Install cwebp
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends webp

      - name: Build ssg from this commit
        run: go build -ldflags "-s -w -X main.Version=$(cat VERSION)" -o build/ssg ./cmd/ssg

      # Turnstile SITE key from a GitHub secret, so it isn't committed. The site
      # key is public (it ships in the page HTML), so this only keeps it out of
      # the repo — it is not a secret in the security sense. When the GitHub
      # secret is unset (forks, or if it isn't configured) the demo/test key in
      # docs-site.yaml stays, so the build never breaks. Runs before both the PR
      # build check and the deploy. See workers/comments/README.md.
      - name: Inject Turnstile site key
        env:
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          if [ -n "${TURNSTILE_SITE_KEY}" ]; then
            sed -i "s|turnstileSiteKey: \".*\"|turnstileSiteKey: \"${TURNSTILE_SITE_KEY}\"|" docs-site.yaml
            echo "Turnstile site key injected from secrets.TURNSTILE_SITE_KEY."
          else
            echo "secrets.TURNSTILE_SITE_KEY not set — keeping the demo/test site key."
          fi

      # Idempotent: creates the Pages project on the first run, does nothing on
      # every run after. SSG uploads deployments but does not create projects,
      # and a missing project fails the upload with a bare 404.
      # Everything above runs for a pull request too. Everything from here down
      # touches Cloudflare, so it is skipped there.
      - name: Verify the site builds (pull request)
        if: github.event_name == 'pull_request'
        run: ./build/ssg --config docs-site.yaml --check-links=strict

      - name: Ensure the Pages project exists
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          projects="${CF_API}/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          code=$(curl -sS -o /tmp/project.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${projects}/${PROJECT}")
          case "$code" in
            200) echo "Pages project ${PROJECT} already exists." ; exit 0 ;;
            404) ;;
            *) echo "::error::Cloudflare returned ${code} while looking up ${PROJECT}"
               cat /tmp/project.json ; exit 1 ;;
          esac
          echo "Creating Pages project ${PROJECT}…"
          curl -sS --fail-with-body -X POST "$projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${PROJECT}\",\"production_branch\":\"main\"}" >/dev/null
          echo "Created ${PROJECT}."

      # Push the comments worker's SERVER secrets onto the Pages project from
      # GitHub secrets. Pages secrets persist on the project across deploys, so
      # this only re-asserts them; a secret that isn't set in GitHub is skipped,
      # never blanked. TURNSTILE_SECRET is required for the comments POST to
      # verify a token — without it the endpoint returns 503. The moderation
      # password and IP salt are optional. (The D1 binding is not a secret and is
      # configured once on the project — see workers/comments/README.md.)
      - name: Sync comments worker secrets to the Pages project
        if: github.event_name != 'pull_request'
        env:
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET_KEY }}
          COMMENTS_ADMIN_PASSWORD: ${{ secrets.COMMENTS_ADMIN_PASSWORD }}
          COMMENTS_IP_SALT: ${{ secrets.COMMENTS_IP_SALT }}
        run: |
          put() {
            if [ -n "$2" ]; then
              printf '%s' "$2" | npx --yes wrangler@latest pages secret put "$1" --project-name "${PROJECT}"
              echo "set $1 on ${PROJECT}"
            else
              echo "skip $1 (GitHub secret not set)"
            fi
          }
          put TURNSTILE_SECRET "${TURNSTILE_SECRET}"
          put COMMENTS_ADMIN_PASSWORD "${COMMENTS_ADMIN_PASSWORD}"
          put COMMENTS_IP_SALT "${COMMENTS_IP_SALT}"

      # One invocation: SSG deploys only after a successful generate, and both
      # gates abort before that point — shortcode_errors: strict (set in
      # .ssg.yaml) on an unrenderable shortcode, --check-links=strict on a dead
      # internal link. Nothing half-built reaches the CDN.
      - name: Build and deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        run: |
          ./build/ssg --config docs-site.yaml \
            --check-links=strict \
            --deploy=cloudflare \
            --deploy-project="${PROJECT}" \
            --deploy-branch=main

      # Also idempotent. A failure here must not fail the run: the deployment is
      # already live on <project>.pages.dev, and the usual cause is a token
      # without Zone:DNS:Edit, which is a permissions decision, not a build
      # problem.
      - name: Attach the custom domain
        id: domain
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          set -euo pipefail
          domains="${CF_API}/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/domains"
          if curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$domains" \
             | grep -q "\"name\":\"${DOCS_DOMAIN}\""; then
            echo "${DOCS_DOMAIN} is already attached to ${PROJECT}."
            exit 0
          fi
          echo "Attaching ${DOCS_DOMAIN} to ${PROJECT}…"
          curl -sS --fail-with-body -X POST "$domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${DOCS_DOMAIN}\"}" >/dev/null
          echo "Attached. DNS and the certificate are provisioned by Cloudflare."

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### Documentation site deployed"
            echo
            echo "- Project: \`${PROJECT}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- Preview: https://${PROJECT}.pages.dev/"
            if [[ "${DOMAIN_OUTCOME}" == "success" ]]; then
              echo "- Site: https://${DOCS_DOMAIN}/"
            else
              echo "- ⚠️ Custom domain \`${DOCS_DOMAIN}\` was not attached — see the"
              echo "  \"Attach the custom domain\" step. The token likely lacks"
              echo "  Zone:DNS:Edit; attach it once in the dashboard instead."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DOMAIN_OUTCOME: ${{ steps.domain.outcome }}
