# SonarCloud analysis configuration.
# The project is bound to SonarCloud via Automatic Analysis (no CI scanner step);
# this file only narrows the ruleset where a finding is a deliberate, reviewed choice.

# go:S4790 ("weak hash algorithm") is a false positive in the deploy package: the
# Netlify and Vercel Direct-Upload APIs content-address every file by its SHA-1 digest
# (a cache/dedup key defined by THEIR protocol). SHA-1 here is an interop requirement,
# never a security primitive, and cannot be substituted. gosec is likewise suppressed
# inline with `#nosec G401,G505` and a matching justification.
sonar.issue.ignore.multicriteria=deploySha1Digest
sonar.issue.ignore.multicriteria.deploySha1Digest.ruleKey=go:S4790
sonar.issue.ignore.multicriteria.deploySha1Digest.resourceKey=internal/deploy/**
