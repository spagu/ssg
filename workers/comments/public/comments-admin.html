<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Comments moderation</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 52rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; }
    .login { display: grid; gap: 0.5rem; max-width: 20rem; }
    input, button, select, textarea { font: inherit; padding: 0.5rem 0.75rem; border: 1px solid #94a3b8; border-radius: 0.5rem; }
    textarea { width: 100%; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { cursor: pointer; }
    details.import { margin-top: 1.5rem; border-top: 1px solid #e2e8f0; padding-top: 1rem; }
    details.import summary { cursor: pointer; font-weight: 600; }
    .import-form { display: grid; gap: 0.5rem; margin-top: 0.75rem; }
    .primary { background: #0050a6; color: #fff; border-color: #0050a6; }
    .tabs { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .tabs button[aria-pressed="true"] { background: #0f172a; color: #fff; border-color: #0f172a; }
    .c { border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.75rem 1rem; margin: 0.75rem 0; }
    .c-head { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: baseline; color: #475569; font-size: 0.875rem; }
    .c-author { font-weight: 600; color: inherit; }
    .c-body { white-space: pre-wrap; overflow-wrap: anywhere; margin: 0.5rem 0; }
    .c-actions { display: flex; gap: 0.5rem; }
    .muted { color: #64748b; }
    a { color: #0050a6; }
    @media (prefers-color-scheme: dark) {
      .c { border-color: #334155; } .c-head { color: #94a3b8; }
      .tabs button[aria-pressed="true"] { background: #e2e8f0; color: #0f172a; border-color: #e2e8f0; }
    }
  </style>
</head>
<body>
  <h1>Comments moderation</h1>

  <form class="login" id="login">
    <label>Password <input type="password" id="pw" autocomplete="current-password" required></label>
    <button class="primary" type="submit">Sign in</button>
    <p class="muted" id="login-msg" role="status"></p>
  </form>

  <div id="panel" hidden>
    <div class="tabs" role="tablist">
      <button data-status="pending" aria-pressed="true">Pending</button>
      <button data-status="spam" aria-pressed="false">Spam</button>
      <button data-status="approved" aria-pressed="false">Approved</button>
    </div>
    <div id="list" aria-live="polite"></div>

    <details class="import">
      <summary>Import comments</summary>
      <div class="import-form">
        <p class="muted">Paste normalised JSON — an array of
          <code>{url, author, body, email?, created_at?, status?}</code>, or an
          object <code>{items: [...]}</code> — or choose a <code>.json</code> file
          converted from your old system (Disqus, WordPress, …).</p>
        <label>Default status for items without one
          <select id="import-status">
            <option value="approved">approved</option>
            <option value="pending">pending</option>
            <option value="spam">spam</option>
          </select>
        </label>
        <input type="file" id="import-file" accept="application/json,.json">
        <textarea id="import-json" rows="6" placeholder='[{"url":"/blog/x/","author":"Ada","body":"First!","created_at":"2021-05-01T10:00:00Z"}]'></textarea>
        <button class="primary" id="import-run" type="button">Import</button>
        <p class="muted" id="import-msg" role="status"></p>
      </div>
    </details>
  </div>

  <script>
    (function () {
      "use strict";
      var API = "/api/comments/admin";
      var auth = "";
      var current = "pending";

      function authHeader() { return { authorization: "Basic " + btoa(":" + auth) }; }

      function esc(node, text) { node.textContent = text; return node; }

      function load(status) {
        current = status;
        document.querySelectorAll(".tabs button").forEach(function (b) {
          b.setAttribute("aria-pressed", String(b.getAttribute("data-status") === status));
        });
        var list = document.getElementById("list");
        list.textContent = "Loading…";
        fetch(API + "?status=" + status, { headers: authHeader() })
          .then(function (r) {
            if (r.status === 401) throw new Error("unauthorised");
            return r.json();
          })
          .then(function (data) { render(list, data); })
          .catch(function (e) { list.textContent = e.message === "unauthorised" ? "Wrong password." : "Error loading."; });
      }

      function render(list, data) {
        list.textContent = "";
        if (!data.comments.length) { list.appendChild(esc(document.createElement("p"), "Nothing here.")); return; }
        data.comments.forEach(function (c) {
          var card = document.createElement("div"); card.className = "c";
          var head = document.createElement("div"); head.className = "c-head";
          head.appendChild(esc(document.createElement("span"), c.author)).className = "c-author";
          var link = document.createElement("a"); link.href = c.url; esc(link, c.url); head.appendChild(link);
          head.appendChild(esc(document.createElement("time"), new Date(c.created_at).toLocaleString()));
          card.appendChild(head);
          card.appendChild(esc(document.createElement("div"), c.body)).className = "c-body";
          var actions = document.createElement("div"); actions.className = "c-actions";
          if (c.status !== "approved") actions.appendChild(button("Approve", "approve", c.id));
          if (c.status !== "spam") actions.appendChild(button("Spam", "spam", c.id));
          actions.appendChild(button("Delete", "delete", c.id));
          card.appendChild(actions);
          list.appendChild(card);
        });
      }

      function button(label, action, id) {
        var b = esc(document.createElement("button"), label);
        b.addEventListener("click", function () {
          b.disabled = true;
          fetch(API, { method: "POST", headers: Object.assign({ "content-type": "application/json" }, authHeader()), body: JSON.stringify({ id: id, action: action }) })
            .then(function () { load(current); });
        });
        return b;
      }

      document.getElementById("login").addEventListener("submit", function (e) {
        e.preventDefault();
        auth = document.getElementById("pw").value;
        fetch(API + "?status=pending", { headers: authHeader() }).then(function (r) {
          if (!r.ok) {
            document.getElementById("login-msg").textContent =
              r.status === 401 ? "Wrong password." : "Moderation is not configured on the server.";
            return;
          }
          document.getElementById("login").hidden = true;
          document.getElementById("panel").hidden = false;
          load("pending");
        });
      });
      document.querySelectorAll(".tabs button").forEach(function (b) {
        b.addEventListener("click", function () { load(b.getAttribute("data-status")); });
      });

      // Import: read a chosen file into the textarea, then POST the JSON. Accepts
      // a bare array or an { items: [...] } object; the default-status select
      // applies to any item that doesn't carry its own status.
      var fileInput = document.getElementById("import-file");
      if (fileInput) {
        fileInput.addEventListener("change", function () {
          var f = fileInput.files && fileInput.files[0];
          if (!f) return;
          f.text().then(function (t) { document.getElementById("import-json").value = t; });
        });
      }
      var runBtn = document.getElementById("import-run");
      if (runBtn) {
        runBtn.addEventListener("click", function () {
          var msg = document.getElementById("import-msg");
          var raw = document.getElementById("import-json").value.trim();
          if (!raw) { msg.textContent = "Nothing to import."; return; }
          var parsed;
          try { parsed = JSON.parse(raw); } catch (e) { msg.textContent = "Invalid JSON: " + e.message; return; }
          var items = Array.isArray(parsed) ? parsed : parsed.items;
          if (!Array.isArray(items)) { msg.textContent = "Expected an array or an { items: [...] } object."; return; }
          runBtn.disabled = true;
          msg.textContent = "Importing " + items.length + "…";
          fetch("/api/comments/import", {
            method: "POST",
            headers: Object.assign({ "content-type": "application/json" }, authHeader()),
            body: JSON.stringify({ items: items, defaultStatus: document.getElementById("import-status").value }),
          })
            .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
            .then(function (res) {
              if (!res.ok) { msg.textContent = (res.d && res.d.error) || "Import failed."; return; }
              msg.textContent = "Imported " + res.d.imported + ", " + res.d.duplicate +
                " already present, " + res.d.invalid + " skipped.";
              load(current);
            })
            .catch(function () { msg.textContent = "Network error."; })
            .finally(function () { runBtn.disabled = false; });
        });
      }

      // Cloudflare Access: if this page is already behind an Access policy, the
      // moderator is authenticated at the edge and the CF_Authorization cookie
      // authorises the API. Probe once with no password; if it's accepted, skip
      // the login form entirely. Falls through to the password form otherwise.
      fetch(API + "?status=pending", { credentials: "same-origin" }).then(function (r) {
        if (!r.ok) return;
        document.getElementById("login").hidden = true;
        document.getElementById("panel").hidden = false;
        load("pending");
      }).catch(function () { /* stay on the password form */ });
    })();
  </script>
</body>
</html>
