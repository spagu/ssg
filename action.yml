# GitHub Action for SSG - Static Site Generator
# Usage in workflow:
#   - uses: spagu/ssg@v1
#     with:
#       source: 'my-content-folder'
#       template: 'krowy'
#       domain: 'example.com'

name: "SSG - Static Site Generator"
description: "Generate static sites from Markdown content with YAML frontmatter"
author: "spagu"

branding:
  icon: "file-text"
  color: "green"

inputs:
  source:
    description: "Content source folder name (inside content/ directory)"
    required: true
  template:
    description: "Template name to use (inside templates/ directory)"
    required: true
    default: "simple"
  domain:
    description: "Target domain for the generated site"
    required: true
  version:
    description: "SSG version to use (default: latest)"
    required: false
    default: "latest"
  content-dir:
    description: "Path to content directory (default: content)"
    required: false
    default: "content"
  templates-dir:
    description: "Path to templates directory (default: templates)"
    required: false
    default: "templates"
  output-dir:
    description: "Path to output directory (default: output)"
    required: false
    default: "output"
  webp:
    description: "Convert images to WebP format (true/false)"
    required: false
    default: "false"
  webp-quality:
    description: "WebP compression quality 1-100 (default: 60)"
    required: false
    default: "60"
  zip:
    description: "Create ZIP file for Cloudflare Pages deployment (true/false)"
    required: false
    default: "false"
  minify:
    description: "Minify HTML, CSS, and JS output (true/false)"
    required: false
    default: "false"
  clean:
    description: "Clean output directory before build (true/false)"
    required: false
    default: "false"
  engine:
    description: "Template engine: go (default), pongo2, mustache, or handlebars"
    required: false
    default: "go"
  online-theme:
    description: "Download theme from URL (GitHub, GitLab, or direct ZIP)"
    required: false
    default: ""
  deploy:
    description: "Native deploy provider: cloudflare | github-pages | netlify | vercel | ftp | sftp (secrets via env)"
    required: false
    default: ""
  deploy-project:
    description: "Pages/site/project name (cloudflare, netlify, vercel)"
    required: false
    default: ""
  deploy-branch:
    description: "Target branch for cloudflare/github-pages (default gh-pages)"
    required: false
    default: ""
  deploy-target:
    description: "ftp/sftp URL or git remote for github-pages"
    required: false
    default: ""

outputs:
  output-path:
    description: "Path to the generated site output directory"
    value: ${{ steps.generate.outputs.output-path }}
  zip-file:
    description: "Path to the generated ZIP file (if --zip was used)"
    value: ${{ steps.generate.outputs.zip-file }}
  zip-size:
    description: "Size of the generated ZIP file in bytes"
    value: ${{ steps.generate.outputs.zip-size }}

runs:
  using: "composite"
  steps:
    - name: Download SSG binary
      id: download
      shell: bash
      # SECURITY (SEC-002): pass inputs via env:, never interpolate into run:.
      env:
        IN_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        VERSION="$IN_VERSION"
        # Reject anything that isn't a plausible version/tag or "latest".
        if ! [[ "$VERSION" =~ ^(latest|v?[0-9A-Za-z._-]+)$ ]]; then
          echo "::error::Invalid version: $VERSION"
          exit 1
        fi

        # Determine OS and architecture
        case "$RUNNER_OS" in
          Linux)  OS="linux" ;;
          macOS)  OS="darwin" ;;
          Windows) OS="windows" ;;
          *) echo "::error::Unsupported OS: $RUNNER_OS"; exit 1 ;;
        esac

        case "$RUNNER_ARCH" in
          X64)   ARCH="amd64" ;;
          ARM64) ARCH="arm64" ;;
          *) echo "::error::Unsupported architecture: $RUNNER_ARCH"; exit 1 ;;
        esac

        # Get latest version if not specified
        if [[ "$VERSION" == "latest" ]]; then
          VERSION=$(curl -sL https://api.github.com/repos/spagu/ssg/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          if [[ -z "$VERSION" ]]; then
            echo "::error::Failed to get latest version"
            exit 1
          fi
        fi

        echo "📦 Downloading SSG $VERSION for $OS/$ARCH..."

        # Build download URL (format: ssg-OS-ARCH.tar.gz - no version in filename)
        if [[ "$OS" == "windows" ]]; then
          ARCHIVE="ssg-${OS}-${ARCH}.zip"
        else
          ARCHIVE="ssg-${OS}-${ARCH}.tar.gz"
        fi

        URL="https://github.com/spagu/ssg/releases/download/${VERSION}/${ARCHIVE}"

        # Download
        echo "🔗 URL: $URL"
        HTTP_CODE=$(curl -sL -w "%{http_code}" "$URL" -o "/tmp/$ARCHIVE")

        if [[ "$HTTP_CODE" != "200" ]]; then
          echo "::error::Failed to download SSG $VERSION. HTTP code: $HTTP_CODE"
          echo "::error::URL: $URL"
          echo "::error::Make sure release $VERSION exists and has binary assets."
          exit 1
        fi

        # Verify it's a valid archive (not HTML error page)
        if file "/tmp/$ARCHIVE" | grep -q "HTML"; then
          echo "::error::Downloaded file is not a valid archive (got HTML page)"
          echo "::error::Release $VERSION may not have binary assets yet"
          exit 1
        fi

        # Extract
        if [[ "$OS" == "windows" ]]; then
          unzip -q "/tmp/$ARCHIVE" -d /tmp/ssg-bin
        else
          mkdir -p /tmp/ssg-bin
          tar -xzf "/tmp/$ARCHIVE" -C /tmp/ssg-bin
        fi

        # Make executable and add to PATH
        chmod +x /tmp/ssg-bin/ssg*
        echo "/tmp/ssg-bin" >> $GITHUB_PATH

        echo "✅ SSG $VERSION installed successfully"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install WebP tools
      shell: bash
      run: |
        echo "📦 Installing WebP tools..."
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt-get update && sudo apt-get install -y webp
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install webp
        else
          echo "::warning::WebP tools not available on Windows. If you need WebP conversion, use Linux/macOS runner."
        fi
        echo "✅ WebP tools installed"

    - name: Generate site
      id: generate
      shell: bash
      # SECURITY (SEC-002): all inputs are passed through env: and referenced as
      # quoted shell variables. Never interpolate ${{ inputs.* }} directly inside
      # run: — that lets attacker-controlled input inject shell commands.
      env:
        IN_SOURCE: ${{ inputs.source }}
        IN_TEMPLATE: ${{ inputs.template }}
        IN_DOMAIN: ${{ inputs.domain }}
        IN_CONTENT_DIR: ${{ inputs.content-dir }}
        IN_TEMPLATES_DIR: ${{ inputs.templates-dir }}
        IN_OUTPUT_DIR: ${{ inputs.output-dir }}
        IN_WEBP: ${{ inputs.webp }}
        IN_WEBP_QUALITY: ${{ inputs.webp-quality }}
        IN_ZIP: ${{ inputs.zip }}
        IN_MINIFY: ${{ inputs.minify }}
        IN_CLEAN: ${{ inputs.clean }}
        IN_ENGINE: ${{ inputs.engine }}
        IN_ONLINE_THEME: ${{ inputs.online-theme }}
        IN_DEPLOY: ${{ inputs.deploy }}
        IN_DEPLOY_PROJECT: ${{ inputs.deploy-project }}
        IN_DEPLOY_BRANCH: ${{ inputs.deploy-branch }}
        IN_DEPLOY_TARGET: ${{ inputs.deploy-target }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        # Validate untrusted inputs before use.
        if ! [[ "$IN_WEBP_QUALITY" =~ ^[0-9]+$ ]]; then
          echo "::error::webp-quality must be a number, got: $IN_WEBP_QUALITY"
          exit 1
        fi
        case "$IN_ENGINE" in
          ""|go|pongo2|mustache|handlebars) ;;
          *) echo "::error::Invalid engine: $IN_ENGINE"; exit 1 ;;
        esac
        case "$IN_DEPLOY" in
          ""|cloudflare|github-pages|netlify|vercel|ftp|sftp) ;;
          *) echo "::error::Invalid deploy provider: $IN_DEPLOY"; exit 1 ;;
        esac

        # Build flags as an array (never a space-joined string).
        FLAGS=()
        if [[ "$IN_WEBP" == "true" ]]; then
          FLAGS+=(--webp --webp-quality="$IN_WEBP_QUALITY")
        fi
        if [[ "$IN_ZIP" == "true" ]]; then
          FLAGS+=(--zip)
        fi
        if [[ "$IN_MINIFY" == "true" ]]; then
          FLAGS+=(--minify-all)
        fi
        if [[ "$IN_CLEAN" == "true" ]]; then
          FLAGS+=(--clean)
        fi
        if [[ -n "$IN_ENGINE" && "$IN_ENGINE" != "go" ]]; then
          FLAGS+=(--engine="$IN_ENGINE")
        fi
        if [[ -n "$IN_ONLINE_THEME" ]]; then
          FLAGS+=(--online-theme="$IN_ONLINE_THEME")
        fi
        # Native deploy (secrets are read from the job environment by the ssg binary).
        if [[ -n "$IN_DEPLOY" ]]; then
          FLAGS+=(--deploy="$IN_DEPLOY")
          [[ -n "$IN_DEPLOY_PROJECT" ]] && FLAGS+=(--deploy-project="$IN_DEPLOY_PROJECT")
          [[ -n "$IN_DEPLOY_BRANCH" ]] && FLAGS+=(--deploy-branch="$IN_DEPLOY_BRANCH")
          [[ -n "$IN_DEPLOY_TARGET" ]] && FLAGS+=(--deploy-target="$IN_DEPLOY_TARGET")
        fi

        # Check if content directory exists
        if [[ ! -d "$IN_CONTENT_DIR/$IN_SOURCE" ]]; then
          echo "::error::Content source directory not found: $IN_CONTENT_DIR/$IN_SOURCE"
          exit 1
        fi

        # Check if templates exist, copy from action repo if not
        if [[ ! -d "$IN_TEMPLATES_DIR/$IN_TEMPLATE" ]]; then
          if [[ -d "$ACTION_PATH/templates/$IN_TEMPLATE" ]]; then
            echo "📁 Copying template '$IN_TEMPLATE' from action..."
            mkdir -p "$IN_TEMPLATES_DIR"
            cp -r "$ACTION_PATH/templates/$IN_TEMPLATE" "$IN_TEMPLATES_DIR/"
          else
            echo "::error::Template directory not found: $IN_TEMPLATES_DIR/$IN_TEMPLATE"
            exit 1
          fi
        fi

        # Run generator
        echo "::group::Running SSG"
        ssg "$IN_SOURCE" "$IN_TEMPLATE" "$IN_DOMAIN" \
          --content-dir="$IN_CONTENT_DIR" \
          --templates-dir="$IN_TEMPLATES_DIR" \
          --output-dir="$IN_OUTPUT_DIR" \
          "${FLAGS[@]}"
        echo "::endgroup::"

        # Set outputs
        echo "output-path=$IN_OUTPUT_DIR" >> "$GITHUB_OUTPUT"

        # Handle ZIP output
        if [[ "$IN_ZIP" == "true" ]]; then
          ZIP_FILE="$IN_DOMAIN.zip"
          if [[ -f "$ZIP_FILE" ]]; then
            ZIP_SIZE=$(stat -f%z "$ZIP_FILE" 2>/dev/null || stat --format=%s "$ZIP_FILE")
            echo "zip-file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
            echo "zip-size=$ZIP_SIZE" >> "$GITHUB_OUTPUT"
            echo "📦 ZIP created: $ZIP_FILE ($((ZIP_SIZE / 1024 / 1024)) MB)"
          fi
        fi
